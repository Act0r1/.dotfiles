# Change the default Omarchy look'n'feel

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    gaps_in = 2
    gaps_out = 3
    border_size = 0

    # Use master layout instead of dwindle
    # layout = master
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    # Don't steal focus when app sends activation request (e.g. notification)
    focus_on_activate = false
}

# Focus window when it requests activation
windowrule = focus_on_activate on, match:class .*

# Purple border only for ghostty (colors from tmux theme)
windowrule = border_size 2, match:class com.mitchellh.ghostty
windowrule = border_color rgba(d6aaffee) rgba(9ab6ffee) 45deg, match:class com.mitchellh.ghostty

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    # Use round window corners
    # rounding = 8
}

# https://wiki.hypr.land/Configuring/Dwindle-Layout/
dwindle {
    # Avoid overly wide single-window layouts on wide screens
    # single_window_aspect_ratio = 1 1
}
